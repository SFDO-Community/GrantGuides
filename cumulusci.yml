minimum_cumulusci_version: '3.80.0'
project:
    name: GrantGuides
    package:
        name: Grants Content Kit
        namespace: GCKit
        api_version: '55.0'
    git:
        default_branch: 'main'
        prefix_feature: feature/
        prefix_beta: beta/
        prefix_release: release/
        release_notes:
            parsers:
                1:
                    class_path: cumulusci.tasks.release_notes.parser.GithubLinesParser
                    title: Critical Changes
                2:
                    class_path: cumulusci.tasks.release_notes.parser.GithubLinesParser
                    title: Changes
                3:
                    class_path: cumulusci.tasks.release_notes.parser.GithubIssuesParser
                    title: Issues Closed
                4:
                    class_path: cumulusci.tasks.release_notes.parser.GithubLinesParser
                    title: New Metadata
                5:
                    class_path: cumulusci.tasks.release_notes.parser.GithubLinesParser
                    title: Deleted Metadata
        repo_url: https://github.com/Salesforce-org-Impact-Labs/GrantGuides
    source_format: sfdx

tasks:
    robot:
        options:
            suites: robot/GrantGuides/tests
            options:
                outputdir: robot/GrantGuides/results

    robot_testdoc:
        options:
            path: robot/GrantGuides/tests
            output: robot/GrantGuides/doc/GrantGuides_tests.html

    run_tests:
        options:
            required_org_code_coverage_percent: 75

flows:
    config_dev:
        steps:
            2:
                task: dx_push
            3:
                task: assign_permission_sets
                options:
                    api_names: GGW_User_Permissions
            4:
                task: command
                options:
                    command: cci org default --org dev
            5:
               task: command
               options:
                   command: sfdx data import tree -p test-data/export-section-GGW_Section__c-plan.json